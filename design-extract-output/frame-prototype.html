<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>At-Tamassok — Thalia Bassim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Geist+Mono:wght@300;400&display=swap');
@font-face { font-family:'Favorit'; src:url('fonts/FavoritLightC.woff2') format('woff2'); font-weight:300; font-style:normal; font-display:swap; }
@font-face { font-family:'Favorit'; src:url('fonts/FavoritBookC.woff2') format('woff2'); font-weight:400; font-style:normal; font-display:swap; }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:   #faf9f6;
  --ink:  rgba(12,11,10,1);
  --i8:   rgba(12,11,10,.92);
  --i5:   rgba(12,11,10,.70);
  --i3:   rgba(12,11,10,.52);
  --i1:   rgba(12,11,10,.12);
  --rule: rgba(12,11,10,.22);
  --ff:  'Favorit','Helvetica Neue',sans-serif;
  --fs:  'EB Garamond',Georgia,serif;
  --fm:  'Geist Mono',monospace;
  --fw:  min(400px, 45vh); /* fills most of hero; clamps on short viewports */
  --fh:  calc(var(--fw) * 1.25); /* 4:5 portrait — explicit beats aspect-ratio */
  --mat: 20px;             /* wide mat = gallery credibility */
}

html { scroll-behavior:smooth; }

body {
  font-family: var(--ff);
  background: var(--bg);
  color: var(--i8);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color:inherit; text-decoration:none; }

/* ─────────────────────────────────────────── NAV
   Slim, institutional — like the desk at a SoHo gallery.
   Serif title is the center of gravity. Everything else recedes.
*/
.nav {
  position: fixed; inset: 0 0 auto;
  z-index: 100;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: baseline;       /* baseline keeps mixed serif/sans cohesive */
  padding: 17px 44px;
  background: var(--bg);
  border-bottom: 1px solid var(--i1);
  opacity: 0;
  pointer-events: none;
}
.nav-l {
  font-family: var(--ff);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: .04em;
  color: var(--ink);
}
.nav-c {
  font-family: var(--fs);
  font-style: normal;
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: .01em;
  letter-spacing: .01em;
  white-space: nowrap;
}
.nav-r {
  display: flex;
  justify-content: flex-end;
  align-items: baseline;
  gap: 28px;
}
.nav-r a {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: .04em;
  color: var(--ink);
  transition: color 220ms;
}
.nav-r a:hover { color: var(--ink); }
.nav-r .nav-essay {
  font-family: var(--fs);
  font-style: italic;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: .01em;
  color: var(--ink);
}

/* ─────────────────────────────────────────── HERO */
.hero {
  height: 150vh;
  position: relative;
}
.hero-pin {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ─────────────────────────────────────────── COMPOSITION
   Small framed image in a large field of warm paper.
   The negative space is the design.
*/
.comp {
  position: relative;
  padding: 96px 0 180px;  /* extra bottom room for VIEW PRINTS lane */
  will-change: opacity, transform;
}

/* ─────────────────────────────────────────── DOUBLE-RULE MAT
   outer-border → mat-gap (--mat) → inner-border → image
   Mat bg = page bg. Rules alone define the depth.
*/
.mat-o {
  border: 1px solid var(--rule);
  padding: var(--mat);
  background: var(--bg);
  width: max-content; /* don't stretch — wrap tightly around image */
}
.mat-i {
  border: 1px solid var(--rule);
  overflow: hidden;
  line-height: 0;
  display: block;
}
.hero-img {
  display: block;
  width: var(--fw);
  height: var(--fh);
  object-fit: cover;
}

/* ─────────────────────────────────────────── GALLERY LABELS
   Serif does the heavy lifting here.
   The title block reads like an exhibition wall card.
   Favorit only appears for the smallest utility text.
*/
.lbl { position: absolute; }

/* TOP-LEFT: Arabic above Latin — both serif */
.lbl-tl { top: 0; left: 0; }

.lbl-tl .ar {
  display: block;
  font-family: var(--fs);
  font-weight: 500;
  font-size: 40px;
  color: var(--i8);
  margin-bottom: 10px;
  letter-spacing: .01em;
  line-height: 1.1;
}
.lbl-tl .en {
  display: block;
  font-family: var(--fs);
  font-style: italic;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .01em;
  color: var(--ink);
  line-height: 1;
}

/* BOTTOM-LEFT: exhibition statement */
.lbl-bl {
  bottom: 72px; left: 0;
  max-width: 240px;
}
.lbl-bl p {
  font-family: var(--fs);
  font-style: italic;
  font-size: 19px;
  line-height: 1.6;
  color: var(--i8);
}

/* BOTTOM-RIGHT: actions */
.lbl-br {
  bottom: 72px; right: 0;
  text-align: right;
}
.lbl-br .es {
  display: block;
  font-family: var(--fs);
  font-style: italic;
  font-size: 19px;
  color: var(--i8);
  transition: opacity 200ms;
}
.lbl-br .es:hover { opacity: .28; }

/* BOTTOM-CENTER: VIEW PRINTS — the visual hand-off to the catalog.
   Sits centered at the bottom of the composition with breathing room. */
.lbl-bc {
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.lbl-bc .vp {
  display: inline-block;
  font-family: var(--ff);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink);
  transition: opacity 200ms;
}
.lbl-bc .vp:hover { opacity: .50; }


/* ─────────────────────────────────────────── CATALOG BAR */
.cat-bar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 22px 44px;
  border-bottom: 1px solid var(--i1);
  scroll-margin-top: 48px;
}
.cat-heading {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink);
}
.cat-sub {
  font-family: var(--fm);
  font-size: 15px;
  font-weight: 400;
  color: var(--i8);
  letter-spacing: .02em;
}

/* ─────────────────────────────────────────── CATALOG GRID
   1px rule between cells — contact sheet, not storefront.
   Generous padding. The image is the object.
   Caption stacked below, not crammed inline.
*/
.cat-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 0;
  border-top: 1px solid var(--rule);
  border-left: 1px solid var(--rule);
}
.cat-cell {
  background: var(--bg);
  padding: 36px 44px;
  cursor: pointer;
  display: block;
  color: inherit;
  text-decoration: none;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.ci {
  aspect-ratio: 4/5;
  overflow: hidden;
  background: #ebe9e4;
  margin-bottom: 16px;
  position: relative;
}
.ci img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.cat-cell:hover .ci img {
  transform: scale(1.015);
}
.ci img { transition: transform 640ms cubic-bezier(.2,.6,.2,1); }

/* Stacked caption — title / price / edition */
.ct {
  display: block;
  font-family: var(--fs);
  font-style: italic;
  font-size: 21px;
  color: var(--ink);
  margin-bottom: 8px;
}
.cp {
  display: block;
  font-family: var(--fm);
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 4px;
}
.ce {
  display: block;
  font-family: var(--fm);
  font-size: 14px;
  font-weight: 400;
  color: var(--i8);
}

/* ─────────────────────────────────────────── FOOTER
   Two-row rhythm: copyright mark on top, navigation row below.
   Column-gap on the links keeps them from reading as a sentence.
*/
.footer {
  padding: 36px 44px 40px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  border-top: 1px solid var(--i1);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--i5);
}
.footer-cr { letter-spacing: .03em; text-transform: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 32px 36px;
  align-items: baseline;
}
.footer-links a { color: var(--i5); transition: color 200ms; }
.footer-links a:hover { color: var(--ink); }

/* ─────────────────────────────────────────── WIDESCREEN
   Only loosen to 3 cols on very wide viewports — density without
   compromising the 2-col restraint on laptops.
*/
@media (min-width: 1400px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ─────────────────────────────────────────── MOBILE */
@media (max-width: 700px) {
  :root { --fw: min(74vw,280px); --mat: 14px; }

  .hero { height: auto; }
  .hero-pin {
    position: static;
    height: auto;
    display: block;
    padding: 80px 28px 56px;
  }

  .comp { display:flex; flex-direction:column; align-items:flex-start; padding:0; }
  .lbl  { position:static; }
  .lbl-tl { margin-bottom:28px; order:0; align-self:flex-start; }
  .mat-o  { order:1; align-self:flex-start; }

  /* Essay excerpt + read-essay: aligned with the Arabic header at the
     left edge of the composition, same column as the gallery label. */
  .lbl-bl {
    order: 2;
    margin-top: 36px;
    width: var(--fw);
    max-width: var(--fw);
    font-size: 19px;
    line-height: 1.5;
    text-align: left;
    align-self: flex-start;
  }
  .lbl-br {
    order: 3;
    margin-top: 20px;
    width: var(--fw);
    max-width: var(--fw);
    text-align: left;
    align-self: flex-start;
  }
  .lbl-br .es { font-size: 19px; }

  /* VIEW PRINTS — generous whitespace above and below, centered. */
  .lbl-bc {
    order: 4;
    transform: none;
    position: static;
    left: auto; bottom: auto;
    margin-top: 80px;
    margin-bottom: 24px;
    align-self: center;
    text-align: center;
  }
  .lbl-bc .vp { font-size: 14px; }

  /* Nav: hidden at launch, revealed once user scrolls past the hero. */
  .nav {
    grid-template-columns: 1fr auto;
    padding: 16px 20px;
    transition: opacity 260ms ease;
  }
  body.nav-on .nav {
    opacity: 1;
    pointer-events: auto;
  }
  .nav-c { display:none; }
  .nav-l { font-size: 15px; }
  .nav-r { gap: 22px; }
  .nav-r a,
  .nav-r .nav-essay {
    font-family: var(--ff);
    font-style: normal;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: .04em;
    color: var(--ink);
  }

  /* (Catalog hide rule now lives globally, outside the media query.) */
}

@media (max-width: 440px) {
  .cat-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- NAV — appears after hero -->
<nav class="nav" id="nav">
  <span class="nav-l">Thalia Bassim</span>
  <span class="nav-c" lang="ar">التمسّك</span>
  <div class="nav-r">
    <a href="#prints">View prints</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-pin">
    <div class="comp" id="comp">

      <!-- Gallery title card: Arabic above Latin, both serif -->
      <div class="lbl lbl-tl" id="lblTL">
        <span class="ar" lang="ar">التمسّك</span>
        <span class="en">At-Tamassok</span>
      </div>

      <!-- Double-rule mat frame -->
      <div class="mat-o">
        <div class="mat-i">
          <img class="hero-img"
               src="../public/images/catalog/pl-6604-05.jpg"
               alt="At-Tamassok — Thalia Bassim"
               width="260" height="325">
        </div>
      </div>

      <!-- Exhibition statement -->
      <div class="lbl lbl-bl" id="lblBL">
        <p>Lorem ipsum dolor sit amet, adipiscing elit. Small domestic rituals that repeat across distance.</p>
      </div>

      <!-- Bottom-right: essay link -->
      <div class="lbl lbl-br" id="lblBR">
        <a href="#essay"  class="es">Read the essay →</a>
      </div>

      <!-- Bottom-center: view prints (primary hand-off to catalog) -->
      <div class="lbl lbl-bc" id="lblBC">
        <a href="#prints" class="vp">View prints ↓</a>
      </div>

    </div>
  </div>
</section>

<!-- CATALOG -->
<div class="cat-bar">
  <span class="cat-heading">Prints</span>
  <span class="cat-sub">25 works</span>
</div>

<div class="cat-grid" id="prints"></div>

<footer class="footer">
  <span class="footer-cr">© 2026 Thalia Bassim</span>
  <div class="footer-links">
    <a href="#">Contact</a>
    <a href="#">Instagram ↗</a>
    <a href="#">Shipping</a>
    <a href="#">Terms</a>
  </div>
</footer>

<script>
/* ── Catalog grid ──────────────────────────────────────────── */
(function () {
  const grid   = document.getElementById('prints');
  const prices = [380,380,420,460,480,520,520,560,580,600,
                  620,480,420,440,480,540,580,620,380,440,
                  480,540,580,420,480];
  for (let i = 1; i <= 25; i++) {
    const n = String(i).padStart(2, '0');
    const p = prices[i - 1] || 180;
    grid.insertAdjacentHTML('beforeend',
      `<a class="cat-cell" href="product-prototype.html">
        <div class="ci">
          <img src="../public/images/catalog/pl-6604-${n}.jpg"
               alt="Untitled, ${n}" loading="lazy">
        </div>
        <span class="ct">Untitled, ${n}</span>
        <span class="cp">From $${p}</span>
        <span class="ce">Edition of 10</span>
      </a>`
    );
  }
}());

/* ── Scroll transition ─────────────────────────────────────── */
(function () {
  const hero = document.getElementById('hero');
  const comp = document.getElementById('comp');
  const nav  = document.getElementById('nav');
  const lbls = ['lblTL','lblBL','lblBR','lblBC'].map(id => document.getElementById(id));
  const mqMobile = window.matchMedia('(max-width: 700px)');

  let raf = false;

  function clearInline() {
    comp.style.opacity   = '';
    comp.style.transform = '';
    lbls.forEach(l => { if (l) l.style.opacity = ''; });
    nav.style.opacity       = '';
    nav.style.pointerEvents = '';
  }

  function tick() {
    if (mqMobile.matches) {
      /* Mobile: static hero layout. Never dissolve the composition.
         Nav reveals after the user scrolls past ~half the hero. */
      clearInline();
      const threshold = hero.offsetHeight * 0.55;
      document.body.classList.toggle('nav-on', window.scrollY > threshold);
      raf = false;
      return;
    }
    document.body.classList.remove('nav-on');

    const maxS = hero.offsetHeight - window.innerHeight;
    if (maxS <= 0) { raf = false; return; }

    const p = Math.min(1, Math.max(0, window.scrollY / maxS));

    /* Labels: fade out  0.15 → 0.50 */
    const lA = p < .15 ? 1 : p > .50 ? 0 : 1 - (p - .15) / .35;
    lbls.forEach(l => { if (l) l.style.opacity = lA; });

    /* Composition: drift up + dissolve  0.38 → 0.78 */
    const cA = p < .38 ? 1 : p > .78 ? 0 : 1 - (p - .38) / .40;
    const cY = p > .38 ? ((p - .38) / .40) * -9 : 0;
    comp.style.opacity   = cA;
    comp.style.transform = `translateY(${cY}vh)`;

    /* Nav: emerge  0.80 → 0.94  — clean handoff, no dissolve overlap */
    const nA = p < .80 ? 0 : Math.min(1, (p - .80) / .14);
    nav.style.opacity       = nA;
    nav.style.pointerEvents = nA > .05 ? 'auto' : 'none';

    raf = false;
  }

  window.addEventListener('scroll', function () {
    if (!raf) { requestAnimationFrame(tick); raf = true; }
  }, { passive: true });
  mqMobile.addEventListener('change', () => { clearInline(); tick(); });
  tick();
}());
</script>
</body>
</html>
